<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.cdnfonts.com/css/seven-segment" rel="stylesheet">
  <title>SC4Pro Simulator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --grid-line: 2px;
    }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      padding: 16px;
    }

    .simulator {
      display: flex;
      flex-direction: row;
      gap: 20px;
    }

    .screen {
      background: #1a1a14;
      border: 3px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      color: #333;
      user-select: none;
      width: 360px;
      height: fit-content;
    }

    /* ── Top bar: Mode | Club/Angle | Counter + EQ + BT ── */
    .top-mode {
      font-family: 'Seven Segment', monospace;
    }

    .top-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      margin-bottom: 6px;
      padding-bottom: 5px;
      font-size: 0.8rem;
    }

    .top-mode {
      font-weight: 700;
      font-size: 0.95rem;
      color: #ddd;
    }

    .top-club {
      font-family: 'Seven Segment', monospace;
      font-size: 0.85rem;
      color: #ddd;
      text-align: center;
    }

    .top-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      color: #888;
      font-size: 0.78rem;
    }

    .top-right .counter {
      font-family: 'Seven Segment', monospace;
      color: #ddd;
      font-size: 0.85rem;
    }

    .bt-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      display: inline-block;
    }

    .bt-dot.on {
      background: #3b82f6;
    }

    /* ── Shared label/value styles ── */
    .lbl {
      position: absolute;
      top: 4px;
      right: 8px;
      font-size: 0.5rem;
      color: #8a7020;
      letter-spacing: 0.06em;
    }

    .val {
      font-family: 'Seven Segment', monospace;
      font-weight: 700;
      color: #ddd;
      line-height: 1;
    }

    .unit {
      font-family: 'Seven Segment', monospace;
      color: #ddd;
    }

    .carry {
      align-items: end;
      display: flex;
    }

    .carry-val {
      font-size: 3.4rem;
    }

    .carry-unit {
      font-size: 1.1rem;
    }

    .dir-val {
      font-size: 1.8rem;
    }

    .stat {
      position: relative;
      padding-inline: 6px;
    }


    .stat {
      padding-top: 10px;
      padding-bottom: 2px;
      display: flex;
      flex-direction: column;
      gap: var(--grid-line);
      align-items: center;
      justify-content: center;
    }

    .stat-val {
      font-size: 2.0rem;
    }

    .stat-unit {
      font-size: 0.72rem;
    }

    /* ── Connection badge ── */
    #badge {
      margin-top: 12px;
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #333;
      color: #aaa;
    }

    #badge.ok {
      background: #14532d;
      color: #4ade80;
    }

    #badge.err {
      background: #450a0a;
      color: #f87171;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr var(--grid-line) 1fr var(--grid-line) 1fr;
      grid-template-rows: auto var(--grid-line) auto var(--grid-line) auto;
      gap: 0;
      --width: 300px;
      --height: 200px;
    }

    .l {
      background-color: #777;
    }

    .hls {
      margin-right: calc(var(--grid-line) * 2);
    }

    .hlc {
      margin-inline: calc(var(--grid-line) * 2);
    }

    .hle {
      margin-left: calc(var(--grid-line) * 2);
    }

    .vl {
      margin-block: calc(var(--grid-line) * 2);
    }



    .remote {
      background: #1a1a14;
      border: 3px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      color: #333;

      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 60px 120px 60px 60px;
      gap: 0px;
      padding: 10px;
      position: relative;
      font-size: 8px;
    }

    .button {
      display: flex;
      justify-content: center;
      align-items: center;
      color: #eee;
      border-radius: 4px;
      background: transparent;
      user-select: none;
      text-align: center;
    }

    .plus-minus-button {
      display: flex;
      color: #eee;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      border-left: 1px solid #eee;
      border-right: 1px solid #eee;
      padding: 5px 0;
    }

    .plus-minus-button .pm {
      font-weight: bold;
      color: #eee;
    }
  </style>
</head>

<body>

  <div class="simulator">
    <div class="screen">

      <!-- Top bar: Mode | Club / Angle° | Shots + EQ + BT -->
      <div class="top-bar">
        <span class="top-mode" id="mode-label">Practice</span>
        <span class="top-club"><span id="club-label">W5</span> / <span id="angle-label">19.0</span>°</span>
        <div class="top-right">
          <span class="counter" id="shot-counter">000</span>
          <span id="eq-icon" title="Equalizer">≋</span>
          <span class="bt-dot" id="bt-dot" title="Bluetooth"></span>
        </div>
      </div>

      <div class="grid">
        <div class="stat carry" style="grid-column: span 3">
          <div class="lbl">Carry</div>
          <div style="display:flex;align-items:baseline;gap:6px">
            <span class="val carry-val" id="carry">---.-</span>
            <span class="unit carry-unit" id="dist-unit">y</span>
          </div>
        </div>
        <div class="l vl"></div>
        <div class="stat">
          <div class="lbl">Launch Direction</div>
          <span class="val dir-val" id="launch-dir">--.-°</span>
        </div>


        <div class="l hls"></div>
        <div></div>
        <div class="l hlc"></div>
        <div></div>
        <div class="l hle"></div>

        <div class="stat">
          <div class="lbl">Swing</div>
          <div style="display:flex;align-items:baseline;gap:4px">
            <span class="val stat-val" id="swing">--.-</span>
            <span class="unit stat-unit" id="speed-unit">mph</span>
          </div>
        </div>
        <div class="l vl"></div>
        <div class="stat">
          <div class="lbl">Ball</div>
          <div style="display:flex;align-items:baseline;gap:4px">
            <span class="val stat-val" id="ball">---.-</span>
            <span class="unit stat-unit">mph</span>
          </div>
        </div>
        <div class="l vl"></div>
        <div class="stat">
          <div class="lbl">Smash Factor</div>
          <span class="val stat-val" id="smash">-.--</span>
        </div>

        <div class="l hls"></div>
        <div></div>
        <div class="l hlc"></div>
        <div></div>
        <div class="l hle"></div>

        <div class="stat">
          <div class="lbl">Launch Angle</div>
          <div style="display:flex;gap:4px">
            <span class="val stat-val" id="launch-angle">--.-</span>
            <span class="unit">°</span>
          </div>
        </div>
        <div class="l vl"></div>
        <div class="stat">
          <div class="lbl">Apex</div>
          <div style="display:flex;align-items:baseline;gap:4px">
            <span class="val stat-val" id="apex">--.-</span>
            <span class="unit stat-unit" id="height-unit">ft</span>
          </div>
        </div>
        <div class="l vl"></div>
        <div class="stat">
          <div class="lbl">Spin</div>
          <div style="display:flex;align-items:baseline;gap:4px">
            <span class="val stat-val" id="spin">----</span>
            <span class="unit stat-unit">rpm</span>
          </div>
        </div>

      </div>

    </div>
    <div class="remote">
      <!-- Top row -->
      <div class="button" onclick="btn(0)">MODE</div>
      <div class="button" onclick="btn(0)">UNIT</div>
      <div class="button" onclick="btn(0)">LANG</div>

      <!-- ± middle row -->
      <div class="plus-minus-button">
        <span class="pm" onclick="btn(0)">+</span>
        <span>VOL</span>
        <span class="pm" onclick="btn(0)">-</span>
      </div>
      <div class="plus-minus-button">
        <span class="pm" onclick="btn(6)">+</span>
        <span>LOFT</span>
        <span class="pm" onclick="btn(7)">-</span>
      </div>
      <div class="plus-minus-button">
        <span class="pm" onclick="btn(8)">+</span>
        <span>TARGET</span>
        <span class="pm" onclick="btn(9)">-</span>
      </div>

      <!-- Third row -->
      <div class="button" onclick="btn(10)">DRIVER</div>
      <div class="button" onclick="btn(11)">FAIRWAY WOOD</div>
      <div class="button" onclick="btn(12)">UTILITY</div>

      <!-- Fourth row -->
      <div class="button" onclick="btn(13)">IRON</div>
      <div class="button" onclick="btn(14)">WEDGE</div>
      <div class="button" onclick="btn(0)">TOTAL/CARRY</div>
    </div>

  </div>
  <span id="badge">Connecting…</span>

  <script>
    let ws;

    function connect() {
      ws = new WebSocket('ws://localhost:8081');
      ws.onopen = () => setBt(true);
      ws.onclose = () => { setBt(false); setTimeout(connect, 2000); };
      ws.onmessage = e => handle(JSON.parse(e.data));
    }

    function handle(msg) {
      if (msg.type === 'status') {
        setMode(msg.mode);
        setClub(msg.club, msg.loftAngle);
        setCounter(msg.shotCount ?? 0);
        if (msg.shot) updateShot(msg.shot);
      } else if (msg.type === 'ack') {
        if (msg.command === 'setMode') setMode(msg.mode);
        if (msg.command === 'setClub') setClub(msg.club, msg.loftAngle);
      } else if (msg.type === 'remoteButton') {
        setClub(msg.club, msg.loftAngle);
      } else if (msg.type === 'shot') {
        setCounter(msg.shotCount);
        updateShot(msg.shot);
      }
    }

    const MODE_LABELS = { Practice: 'Practice', SwingSpeed: 'SW', Sim: 'SIM' };

    function setMode(mode) {
      document.getElementById('mode-label').textContent = MODE_LABELS[mode] ?? mode ?? 'Practice';
    }

    function setClub(club, angle) {
      if (club) document.getElementById('club-label').textContent = club;
      if (angle != null) document.getElementById('angle-label').textContent = angle.toFixed(1);
    }

    function setCounter(n) {
      document.getElementById('shot-counter').textContent = String(n).padStart(3, '0');
    }

    function setBt(on) {
      document.getElementById('bt-dot').className = 'bt-dot' + (on ? ' on' : '');
      document.getElementById('badge').textContent = on ? 'Connected' : 'Disconnected';
      document.getElementById('badge').className = on ? 'ok' : 'err';
    }

    function btn(n) { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'remoteButton', button: n })); }

    function fmt1(v) { return v == null ? '--.-' : v.toFixed(1); }
    function fmt0(v) { return v == null ? '----' : Math.round(v).toString(); }

    function updateShot(s) {
      const metric = s.unit === 'm';
      document.getElementById('dist-unit').textContent = s.unit ?? 'y';
      document.getElementById('height-unit').textContent = metric ? 'm' : 'ft';
      document.getElementById('carry').textContent = fmt1(s.carry);
      document.getElementById('launch-dir').textContent = (s.launchDirection >= 0 ? '+' : '') + fmt1(s.launchDirection) + '°';
      document.getElementById('swing').textContent = fmt1(s.clubSpeed);
      document.getElementById('ball').textContent = fmt1(s.ballSpeed);
      document.getElementById('smash').textContent = fmt1(s.smashFactor);
      document.getElementById('launch-angle').textContent = fmt1(s.launchAngle);
      document.getElementById('apex').textContent = fmt1(s.apex);
      document.getElementById('spin').textContent = fmt0(s.totalSpin);
    }

    connect();
  </script>
</body>

</html>
